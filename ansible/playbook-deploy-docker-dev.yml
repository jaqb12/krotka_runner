---
- name: Deploy Docker Dev app stack to lsrv-01
  hosts: lsrv_01
  become: true

  vars:
    msp_source_path: "{{ playbook_dir }}/../../msp_engineering"
    deploy_dir: /opt/msp
    compose_file_base: docker/docker-compose.yml
    compose_file_dev: docker/docker-compose.dev.yml
    compose_project: msp-dev
    container_prefix: msp-dev

  tasks:
    - name: Create deploy directories on lsrv-01
      file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - "{{ deploy_dir }}/docker"

    - name: Sync app source to lsrv-01
      synchronize:
        src: "{{ msp_source_path }}/"
        dest: "{{ deploy_dir }}/"
        delete: true
        recursive: true
        rsync_opts:
          - "--exclude=.git"
          - "--exclude=__pycache__"
          - "--exclude=*.pyc"
          - "--exclude=.venv"
          - "--exclude=node_modules"
          - "--exclude=.env"
          - "--exclude=docker/.env.tunnel.dev"

    - name: Write .env to lsrv-01
      copy:
        content: "{{ lookup('env', 'MSP_APP_ENV') }}"
        dest: "{{ deploy_dir }}/.env"
        mode: '0600'
        owner: root
        group: root

    - name: Assert MSP_CF_TUNNEL_TOKEN_DEV is set
      assert:
        that:
          - lookup('env', 'MSP_CF_TUNNEL_TOKEN_DEV') | length > 0
        fail_msg: "MSP_CF_TUNNEL_TOKEN_DEV is empty or not set"

    - name: Write .env.tunnel.dev to lsrv-01
      copy:
        content: "{{ lookup('env', 'MSP_CF_TUNNEL_TOKEN_DEV') }}"
        dest: "{{ deploy_dir }}/docker/.env.tunnel.dev"
        mode: '0600'
        owner: root
        group: root

    - name: Get running containers with prefix
      command: docker ps -q -f "name={{ container_prefix }}"
      register: running_containers
      changed_when: false

    - name: Get all containers (running + stopped) with prefix
      command: docker ps -a -q -f "name={{ container_prefix }}"
      register: all_containers
      changed_when: false

    - name: Stop running containers
      command: docker stop --time 30 {{ running_containers.stdout_lines | join(' ') }}
      when: running_containers.stdout_lines | length > 0

    - name: Remove all containers with prefix
      command: docker rm -f {{ all_containers.stdout_lines | join(' ') }}
      when: all_containers.stdout_lines | length > 0

    - name: Remove dangling images
      command: docker image prune -f
      register: prune_result
      changed_when: "'deleted' in prune_result.stdout"

    - name: Build and start docker-compose dev stack
      command: >
        docker compose
        -p {{ compose_project }}
        -f "{{ deploy_dir }}/{{ compose_file_base }}"
        -f "{{ deploy_dir }}/{{ compose_file_dev }}"
        up -d --build
      environment:
        MSP_DB_PASSWORD_DEV: "{{ lookup('env', 'MSP_DB_PASSWORD_DEV') }}"
        TUNNEL_TOKEN: "{{ lookup('env', 'MSP_CF_TUNNEL_TOKEN_DEV') | regex_replace('^TUNNEL_TOKEN=', '') }}"
      async: 600
      poll: 15
      register: compose_result

    - name: Remove source files after build (keep only compose files and secrets)
      shell: |
        find {{ deploy_dir }} -mindepth 1 -maxdepth 1 \
          ! -name '.env' \
          ! -name 'docker' \
          -exec rm -rf {} +
      args:
        executable: /bin/bash


    - name: Wait for services to be ready
      pause:
        seconds: 15

    - name: Print running containers
      command: docker ps --filter "name={{ container_prefix }}" --format "table {% raw %}{{.Names}}\t{{.Status}}{% endraw %}"
      register: running_status
      changed_when: false

    - name: Show deployment result
      debug:
        msg:
          - "=== Docker Dev deployed ==="
          - "{{ running_status.stdout_lines }}"
