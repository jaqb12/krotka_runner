# --- UFW Firewall ---

- name: Install UFW
  apt:
    name: ufw
    state: present
  tags: hardening

- name: Set UFW default incoming policy to deny
  ufw:
    direction: incoming
    policy: deny
  tags: hardening

- name: Set UFW default outgoing policy to allow
  ufw:
    direction: outgoing
    policy: allow
  tags: hardening

- name: Allow SSH through UFW (port 22)
  ufw:
    rule: allow
    port: '22'
    proto: tcp
  tags: hardening

- name: Enable UFW
  ufw:
    state: enabled
  tags: hardening

- name: Allow HTTP (port 80) — lsrv-01 only
  ufw:
    rule: allow
    port: '80'
    proto: tcp
  when: inventory_hostname in groups['lsrv_01']
  tags: hardening

- name: Allow HTTPS (port 443) — lsrv-01 only
  ufw:
    rule: allow
    port: '443'
    proto: tcp
  when: inventory_hostname in groups['lsrv_01']
  tags: hardening

- name: Allow ports 8000-8100 for Docker apps — lsrv-01 only
  ufw:
    rule: allow
    port: '8000:8100'
    proto: tcp
  when: inventory_hostname in groups['lsrv_01']
  tags: hardening

# --- SSH Hardening ---

- name: Harden SSH configuration
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    state: present
    validate: '/usr/sbin/sshd -t -f %s'
  loop:
    - { regexp: '^#?PermitRootLogin',       line: 'PermitRootLogin no' }
    - { regexp: '^#?PasswordAuthentication', line: 'PasswordAuthentication no' }
    - { regexp: '^#?MaxAuthTries',           line: 'MaxAuthTries 3' }
    - { regexp: '^#?LoginGraceTime',         line: 'LoginGraceTime 30' }
    - { regexp: '^#?X11Forwarding',          line: 'X11Forwarding no' }
    - { regexp: '^#?AllowTcpForwarding',     line: 'AllowTcpForwarding no' }
    - { regexp: '^#?ClientAliveInterval',    line: 'ClientAliveInterval 300' }
    - { regexp: '^#?ClientAliveCountMax',    line: 'ClientAliveCountMax 2' }
  notify: Restart sshd
  tags: hardening

# --- unattended-upgrades (all packages) ---

- name: Install unattended-upgrades
  apt:
    name:
      - unattended-upgrades
      - apt-listchanges
    state: present
  tags: hardening

- name: Configure unattended-upgrades for all packages
  copy:
    dest: /etc/apt/apt.conf.d/50unattended-upgrades
    content: |
      Unattended-Upgrade::Allowed-Origins {
          "${distro_id}:${distro_codename}";
          "${distro_id}:${distro_codename}-security";
          "${distro_id}:${distro_codename}-updates";
      };
      Unattended-Upgrade::AutoFixInterruptedDpkg "true";
      Unattended-Upgrade::MinimalSteps "true";
      Unattended-Upgrade::Remove-Unused-Kernel-Packages "true";
      Unattended-Upgrade::Remove-Unused-Dependencies "true";
      Unattended-Upgrade::Automatic-Reboot "false";
    owner: root
    group: root
    mode: '0644'
  tags: hardening

- name: Enable periodic unattended-upgrades
  copy:
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
      APT::Periodic::AutocleanInterval "7";
    owner: root
    group: root
    mode: '0644'
  tags: hardening
