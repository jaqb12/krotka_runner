---
- name: Deploy Docker DB Dev stack to lsrv-01
  hosts: lsrv_01
  become: true

  vars:
    msp_source_path: "{{ playbook_dir }}/../../msp_engineering"
    deploy_dir: /opt/msp
    compose_file: docker/docker-compose.db-dev.yml
    container_prefix: msp-postgres-dev

  tasks:
    - name: Create deploy directory on lsrv-01
      file:
        path: "{{ deploy_dir }}/docker"
        state: directory
        mode: '0755'

    - name: Copy docker-compose.db-dev.yml to lsrv-01
      copy:
        src: "{{ msp_source_path }}/docker/docker-compose.db-dev.yml"
        dest: "{{ deploy_dir }}/docker/docker-compose.db-dev.yml"
        mode: '0644'

    - name: Get running containers with prefix
      command: docker ps -q -f "name={{ container_prefix }}"
      register: running_containers
      changed_when: false

    - name: Get all containers (running + stopped) with prefix
      command: docker ps -a -q -f "name={{ container_prefix }}"
      register: all_containers
      changed_when: false

    - name: Stop running containers
      command: docker stop --time 30 {{ running_containers.stdout_lines | join(' ') }}
      when: running_containers.stdout_lines | length > 0

    - name: Remove all containers with prefix
      command: docker rm -f {{ all_containers.stdout_lines | join(' ') }}
      when: all_containers.stdout_lines | length > 0

    - name: Remove dangling images
      command: docker image prune -f
      register: prune_result
      changed_when: "'deleted' in prune_result.stdout"

    - name: Remove orphan msp_db_dev_net network if not managed by compose
      command: docker network rm msp_db_dev_net
      register: net_remove
      failed_when: net_remove.rc != 0 and 'No such network' not in net_remove.stderr
      changed_when: net_remove.rc == 0

    - name: Build and start docker-compose stack
      command: docker compose -f "{{ deploy_dir }}/{{ compose_file }}" up -d --build
      environment:
        MSP_DB_PASSWORD_DEV: "{{ lookup('env', 'MSP_DB_PASSWORD_DEV') }}"
      async: 600
      poll: 15
      register: compose_result

    - name: Write .env.service for systemd (compose interpolation vars)
      copy:
        dest: "{{ deploy_dir }}/.env.service"
        mode: '0600'
        owner: root
        group: root
        content: |
          MSP_DB_PASSWORD_DEV={{ lookup('env', 'MSP_DB_PASSWORD_DEV') }}

    - name: Create systemd service container-msp-db-dev
      copy:
        dest: /etc/systemd/system/container-msp-db-dev.service
        mode: '0644'
        owner: root
        group: root
        content: |
          [Unit]
          Description=MSP DB Dev (postgres)
          Requires=docker.service
          After=docker.service network-online.target

          [Service]
          WorkingDirectory={{ deploy_dir }}
          EnvironmentFile={{ deploy_dir }}/.env.service
          ExecStart=docker compose -f docker/docker-compose.db-dev.yml up
          ExecStop=docker compose -f docker/docker-compose.db-dev.yml stop
          Restart=no
          TimeoutStopSec=60

          [Install]
          WantedBy=multi-user.target

    - name: Reload systemd and enable container-msp-db-dev
      systemd:
        name: container-msp-db-dev
        daemon_reload: true
        enabled: true

    - name: Wait for services to be ready
      pause:
        seconds: 10

    - name: Print running containers
      command: docker ps --filter "name={{ container_prefix }}" --format "table {% raw %}{{.Names}}\t{{.Status}}{% endraw %}"
      register: running_status
      changed_when: false

    - name: Show deployment result
      debug:
        msg:
          - "=== Docker DB Dev deployed ==="
          - "{{ running_status.stdout_lines }}"
