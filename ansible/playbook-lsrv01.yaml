---
- name: lsrv-01 Daily Maintenance
  hosts: lsrv_01
  become: true

  vars:
    disk_threshold: "{{ lookup('env', 'DISK_THRESHOLD') | default('85', true) }}"
    mem_threshold: "{{ lookup('env', 'MEM_THRESHOLD') | default('90', true) }}"

  handlers:
    - name: Restart sshd
      service:
        name: ssh
        state: restarted

  tasks:
    - name: Health checks
      include_tasks: "{{ playbook_dir }}/jobs/ubuntu-health-check.yaml"
      tags: always

    - name: Package updates
      include_tasks: "{{ playbook_dir }}/jobs/ubuntu-update.yaml"
      tags: update

    - name: Security hardening
      include_tasks: "{{ playbook_dir }}/jobs/ubuntu-hardening.yaml"
      tags: hardening

    - name: Docker maintenance and reboot
      include_tasks: "{{ playbook_dir }}/jobs/ubuntu-docker-maintenance.yaml"
      tags: docker

    - name: Log cleanup
      include_tasks: "{{ playbook_dir }}/jobs/ubuntu-log-cleanup.yaml"
      tags: cleanup
